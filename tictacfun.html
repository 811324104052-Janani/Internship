<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 TicTacFun</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      padding: 40px;
      color: #333;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px #fff;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 10px;
      justify-content: center;
      margin: 30px auto;
    }

    .cell {
      background: #fff;
      border-radius: 12px;
      font-size: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }

    .cell:hover {
      transform: scale(1.05);
      background: #f0f0f0;
    }

    .status {
      font-size: 24px;
      margin-top: 20px;
      font-weight: bold;
    }

    .reset-btn {
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #ff6f61;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .reset-btn:hover {
      background: #ff3b2e;
    }
  </style>
</head>
<body>

  <h1>🎮 TicTacFun</h1>
  <p>Get three in a row to win! ✨</p>

  <div class="board" id="board"></div>
  <div class="status" id="status">Player ❌'s turn</div>
  <button class="reset-btn" onclick="resetGame()">🔄 Restart Game</button>

  <script>
    const board = document.getElementById("board");
    const status = document.getElementById("status");
    let cells = [];
    let currentPlayer = "❌";
    let gameActive = true;

    // Create board cells
    function createBoard() {
      board.innerHTML = "";
      cells = [];
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;
        cell.addEventListener("click", handleCellClick);
        board.appendChild(cell);
        cells.push(cell);
      }
    }

    // Handle cell click
    function handleCellClick(e) {
      const cell = e.target;
      if (cell.innerText !== "" || !gameActive) return;
      cell.innerText = currentPlayer;
      checkWinner();
      currentPlayer = currentPlayer === "❌" ? "⭕" : "❌";
      if (gameActive) {
        status.innerText = `Player ${currentPlayer}'s turn`;
      }
    }

    // Check winner
    function checkWinner() {
      const winPatterns = [
        [0,1,2],[3,4,5],[6,7,8], // rows
        [0,3,6],[1,4,7],[2,5,8], // columns
        [0,4,8],[2,4,6]          // diagonals
      ];

      for (let pattern of winPatterns) {
        const [a,b,c] = pattern;
        if (
          cells[a].innerText &&
          cells[a].innerText === cells[b].innerText &&
          cells[a].innerText === cells[c].innerText
        ) {
          status.innerText = `🎉 Player ${cells[a].innerText} wins! 🎉`;
          gameActive = false;
          return;
        }
      }

      // Check for draw
      if (cells.every(cell => cell.innerText !== "")) {
        status.innerText = "🤝 It's a draw!";
        gameActive = false;
      }
    }

    // Reset game
    function resetGame() {
      currentPlayer = "❌";
      gameActive = true;
      status.innerText = "Player ❌'s turn";
      createBoard();
    }

    // Initialize
    createBoard();
  </script>

</body>
</html>
